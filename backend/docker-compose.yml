services:
  api:
    build: .
    container_name: ai-assistant-app

    ports:
      - "8000:8000"

    volumes:
      - ./app:/code/app

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ai-assistant-db

    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai-assistant-db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: